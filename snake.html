<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neon Snake</title>
<style>
  :root {
    --bg0: #05060f;
    --bg1: #0b1026;
    --grid: rgba(120, 160, 255, 0.05);
    --snake0: #6ef2c1;
    --snake1: #34d0ff;
    --food: #ff5d8f;
    --food-glow: #ff9ec4;
    --text: #dfe7ff;
    --muted: #7c88b8;
    --accent: #8b7dff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background:
      radial-gradient(1200px 800px at 20% -10%, #12183a 0%, transparent 60%),
      radial-gradient(1000px 700px at 100% 110%, #16123a 0%, transparent 55%),
      var(--bg0);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 20px;
  }
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    width: 100%;
    max-width: 520px;
  }
  .brand {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--snake0), var(--snake1), var(--accent));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(52, 208, 255, 0.25);
  }
  .stats { display: flex; gap: 22px; }
  .stat { text-align: right; }
  .stat .label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .stat .value {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .board {
    position: relative;
    border-radius: 18px;
    padding: 14px;
    background: linear-gradient(160deg, rgba(30,40,90,0.55), rgba(10,14,34,0.75));
    box-shadow:
      0 0 0 1px rgba(120,160,255,0.15),
      0 30px 80px -30px rgba(0,0,0,0.9),
      inset 0 0 60px rgba(52,208,255,0.05);
    backdrop-filter: blur(6px);
  }
  canvas {
    display: block;
    border-radius: 10px;
    background:
      linear-gradient(180deg, #070b1c 0%, #0a1026 100%);
    image-rendering: pixelated;
  }
  .overlay {
    position: absolute;
    inset: 14px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    background: rgba(5, 7, 18, 0.72);
    backdrop-filter: blur(3px);
    transition: opacity 0.25s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay h1 { font-size: 30px; font-weight: 800; letter-spacing: 1px; }
  .overlay p { color: var(--muted); font-size: 14px; max-width: 300px; line-height: 1.5; }
  .btn {
    margin-top: 6px;
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #04121a;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    background: linear-gradient(90deg, var(--snake0), var(--snake1));
    box-shadow: 0 10px 30px -8px rgba(52,208,255,0.6);
    transition: transform 0.1s ease, box-shadow 0.2s ease;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 14px 34px -8px rgba(52,208,255,0.75); }
  .btn:active { transform: translateY(1px); }
  .final-score { font-size: 16px; }
  .final-score b { color: var(--snake0); font-size: 22px; }
  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
  }
  .pad {
    display: grid;
    grid-template-columns: repeat(3, 52px);
    grid-template-rows: repeat(3, 52px);
    gap: 8px;
  }
  .pad button {
    border: 1px solid rgba(120,160,255,0.2);
    background: rgba(30,40,90,0.4);
    color: var(--text);
    border-radius: 12px;
    font-size: 20px;
    cursor: pointer;
    transition: background 0.12s ease, transform 0.06s ease;
  }
  .pad button:hover { background: rgba(52,208,255,0.18); }
  .pad button:active { transform: scale(0.92); }
  .pad .up    { grid-column: 2; grid-row: 1; }
  .pad .left  { grid-column: 1; grid-row: 2; }
  .pad .down  { grid-column: 2; grid-row: 2; }
  .pad .right { grid-column: 3; grid-row: 2; }
  .hint { display: flex; gap: 6px; align-items: center; }
  kbd {
    background: rgba(120,160,255,0.12);
    border: 1px solid rgba(120,160,255,0.2);
    border-radius: 5px;
    padding: 1px 7px;
    font-size: 11px;
    font-family: inherit;
  }
  .toprow { display: flex; gap: 10px; align-items: center; }
  .mute {
    border: 1px solid rgba(120,160,255,0.2);
    background: rgba(30,40,90,0.4);
    color: var(--muted);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .mute:hover { color: var(--text); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="toprow">
        <div class="brand">NEON&nbsp;SNAKE</div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="label">Score</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="stat">
          <div class="label">Best</div>
          <div class="value" id="best">0</div>
        </div>
      </div>
    </header>

    <div class="board">
      <canvas id="game" width="480" height="480"></canvas>
      <div class="overlay" id="overlay">
        <h1 id="ovTitle">NEON SNAKE</h1>
        <p id="ovText">Eat the glowing orbs, grow longer, and don't bite yourself or hit the walls. Speed ramps up as you score.</p>
        <div class="final-score" id="finalScore" style="display:none"></div>
        <button class="btn" id="startBtn">PLAY</button>
      </div>
    </div>

    <div class="controls">
      <div class="toprow">
        <div class="hint"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or arrows to steer &nbsp;·&nbsp; <kbd>Space</kbd> pause</div>
        <button class="mute" id="muteBtn">🔊 Sound</button>
      </div>
      <div class="pad">
        <button class="up"    id="btnUp"    aria-label="Up">▲</button>
        <button class="left"  id="btnLeft"  aria-label="Left">◀</button>
        <button class="down"  id="btnDown"  aria-label="Down">▼</button>
        <button class="right" id="btnRight" aria-label="Right">▶</button>
      </div>
    </div>
  </div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const CELLS = 24;                 // grid is CELLS x CELLS
  const SIZE = canvas.width;        // px
  const CELL = SIZE / CELLS;        // px per cell

  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const overlay = document.getElementById("overlay");
  const ovTitle = document.getElementById("ovTitle");
  const ovText = document.getElementById("ovText");
  const finalScore = document.getElementById("finalScore");
  const startBtn = document.getElementById("startBtn");
  const muteBtn = document.getElementById("muteBtn");

  // ---- State ---------------------------------------------------------------
  const State = { MENU: 0, PLAYING: 1, PAUSED: 2, OVER: 3 };
  let state = State.MENU;

  let snake, dir, nextDir, food, score, best, speed, stepMs, acc, last, particles;
  let muted = false;

  try { best = parseInt(localStorage.getItem("neonSnakeBest") || "0", 10) || 0; }
  catch { best = 0; }
  bestEl.textContent = best;

  function reset() {
    const mid = Math.floor(CELLS / 2);
    snake = [
      { x: mid,     y: mid },
      { x: mid - 1, y: mid },
      { x: mid - 2, y: mid },
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    speed = 0;
    stepMs = 130;
    acc = 0;
    last = performance.now();
    particles = [];
    placeFood();
    scoreEl.textContent = "0";
  }

  function placeFood() {
    let p;
    do {
      p = { x: (Math.random() * CELLS) | 0, y: (Math.random() * CELLS) | 0 };
    } while (snake.some(s => s.x === p.x && s.y === p.y));
    food = p;
  }

  // ---- Audio (Web Audio, synthesized) --------------------------------------
  let actx = null;
  function audio() {
    if (muted) return null;
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch { return null; }
    }
    if (actx.state === "suspended") actx.resume();
    return actx;
  }
  function beep(freq, dur, type = "square", vol = 0.15, slideTo = null) {
    const a = audio();
    if (!a) return;
    const t = a.currentTime;
    const osc = a.createOscillator();
    const gain = a.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(gain).connect(a.destination);
    osc.start(t);
    osc.stop(t + dur + 0.02);
  }
  const sfxEat = () => beep(520, 0.09, "square", 0.16, 880);
  const sfxTurn = () => beep(240, 0.03, "sine", 0.05);
  const sfxOver = () => { beep(320, 0.18, "sawtooth", 0.18, 90); setTimeout(() => beep(160, 0.3, "sawtooth", 0.16, 60), 110); };
  const sfxStart = () => { beep(440, 0.08, "square", 0.12, 660); setTimeout(() => beep(660, 0.1, "square", 0.12, 990), 90); };

  // ---- Input ---------------------------------------------------------------
  function setDir(x, y) {
    // prevent 180° reversal against current committed direction
    if (x === -dir.x && y === -dir.y) return;
    if (x === nextDir.x && y === nextDir.y) return;
    nextDir = { x, y };
    if (state === State.PLAYING) sfxTurn();
  }

  const keyMap = {
    ArrowUp: [0, -1], KeyW: [0, -1],
    ArrowDown: [0, 1], KeyS: [0, 1],
    ArrowLeft: [-1, 0], KeyA: [-1, 0],
    ArrowRight: [1, 0], KeyD: [1, 0],
  };

  window.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
      e.preventDefault();
      if (state === State.PLAYING) pause();
      else if (state === State.PAUSED) resume();
      else if (state === State.MENU || state === State.OVER) start();
      return;
    }
    if (e.code === "Enter" && (state === State.MENU || state === State.OVER)) {
      start(); return;
    }
    const m = keyMap[e.code];
    if (m) {
      e.preventDefault();
      if (state === State.PLAYING) setDir(m[0], m[1]);
      else if (state === State.MENU || state === State.OVER) { start(); setDir(m[0], m[1]); }
    }
  });

  const bind = (id, x, y) => {
    document.getElementById(id).addEventListener("click", () => {
      if (state === State.MENU || state === State.OVER) start();
      setDir(x, y);
    });
  };
  bind("btnUp", 0, -1);
  bind("btnDown", 0, 1);
  bind("btnLeft", -1, 0);
  bind("btnRight", 1, 0);

  startBtn.addEventListener("click", () => {
    if (state === State.PAUSED) resume();
    else start();
  });
  muteBtn.addEventListener("click", () => {
    muted = !muted;
    muteBtn.textContent = muted ? "🔇 Muted" : "🔊 Sound";
    if (!muted) sfxTurn();
  });

  // ---- Flow ----------------------------------------------------------------
  function start() {
    reset();
    state = State.PLAYING;
    overlay.classList.add("hidden");
    finalScore.style.display = "none";
    sfxStart();
  }
  function pause() {
    state = State.PAUSED;
    ovTitle.textContent = "PAUSED";
    ovText.textContent = "Take a breath. Press Space or PLAY to resume.";
    finalScore.style.display = "none";
    startBtn.textContent = "RESUME";
    overlay.classList.remove("hidden");
  }
  function resume() {
    state = State.PLAYING;
    last = performance.now();
    overlay.classList.add("hidden");
  }
  function gameOver() {
    state = State.OVER;
    sfxOver();
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      try { localStorage.setItem("neonSnakeBest", String(best)); } catch {}
    }
    ovTitle.textContent = "GAME OVER";
    ovText.textContent = "The snake met its end. Give it another run.";
    finalScore.style.display = "block";
    finalScore.innerHTML = `Score <b>${score}</b> &nbsp;·&nbsp; Best ${best}`;
    startBtn.textContent = "PLAY AGAIN";
    overlay.classList.remove("hidden");
  }

  // ---- Update --------------------------------------------------------------
  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision
    if (head.x < 0 || head.y < 0 || head.x >= CELLS || head.y >= CELLS) {
      return gameOver();
    }
    // self collision (ignore tail cell that will move away, unless growing)
    const willGrow = (head.x === food.x && head.y === food.y);
    const body = willGrow ? snake : snake.slice(0, -1);
    if (body.some(s => s.x === head.x && s.y === head.y)) {
      return gameOver();
    }

    snake.unshift(head);

    if (willGrow) {
      score += 10;
      scoreEl.textContent = String(score);
      sfxEat();
      spawnParticles(head.x, head.y);
      placeFood();
      // ramp speed: faster every few points, floor at 60ms
      stepMs = Math.max(60, 130 - Math.floor(score / 30) * 8);
    } else {
      snake.pop();
    }
  }

  function spawnParticles(cx, cy) {
    const px = (cx + 0.5) * CELL, py = (cy + 0.5) * CELL;
    for (let i = 0; i < 14; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 0.6 + Math.random() * 2.2;
      particles.push({
        x: px, y: py,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 1, r: 1.5 + Math.random() * 2.5,
      });
    }
  }

  // ---- Render --------------------------------------------------------------
  function drawGrid() {
    ctx.strokeStyle = "rgba(120,160,255,0.05)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 1; i < CELLS; i++) {
      const p = i * CELL + 0.5;
      ctx.moveTo(p, 0); ctx.lineTo(p, SIZE);
      ctx.moveTo(0, p); ctx.lineTo(SIZE, p);
    }
    ctx.stroke();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawFood(time) {
    const pulse = 0.5 + 0.5 * Math.sin(time / 220);
    const cx = (food.x + 0.5) * CELL;
    const cy = (food.y + 0.5) * CELL;
    const r = CELL * 0.32 * (0.85 + pulse * 0.25);
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, CELL * 1.4);
    g.addColorStop(0, "rgba(255,158,196,0.6)");
    g.addColorStop(1, "rgba(255,93,143,0)");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cx, cy, CELL * 1.4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#ff5d8f";
    ctx.shadowColor = "#ff9ec4";
    ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawSnake() {
    for (let i = snake.length - 1; i >= 0; i--) {
      const s = snake[i];
      const t = i / Math.max(1, snake.length - 1);
      // color from head (snake1) to tail (snake0)
      const c = mix([52, 208, 255], [110, 242, 193], t);
      const pad = i === 0 ? CELL * 0.08 : CELL * 0.14;
      const x = s.x * CELL + pad;
      const y = s.y * CELL + pad;
      const w = CELL - pad * 2;
      ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
      if (i === 0) { ctx.shadowColor = "rgba(52,208,255,0.7)"; ctx.shadowBlur = 16; }
      roundRect(x, y, w, w, CELL * 0.28);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    // eyes on head
    const h = snake[0];
    const cx = (h.x + 0.5) * CELL, cy = (h.y + 0.5) * CELL;
    const off = CELL * 0.16;
    const ex = dir.x, ey = dir.y;
    ctx.fillStyle = "#04121a";
    for (const s of [-1, 1]) {
      const px = cx + ex * off + (-ey) * off * s;
      const py = cy + ey * off + (ex) * off * s;
      ctx.beginPath();
      ctx.arc(px, py, CELL * 0.07, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.92; p.vy *= 0.92;
      p.life -= dt / 550;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = "#ff9ec4";
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function mix(a, b, t) {
    return [
      Math.round(a[0] + (b[0] - a[0]) * t),
      Math.round(a[1] + (b[1] - a[1]) * t),
      Math.round(a[2] + (b[2] - a[2]) * t),
    ];
  }

  function render(time) {
    ctx.clearRect(0, 0, SIZE, SIZE);
    drawGrid();
    if (state !== State.MENU) {
      drawFood(time);
      drawSnake();
    }
    drawParticles(16);
  }

  // ---- Loop ----------------------------------------------------------------
  function loop(now) {
    const dt = now - last;
    last = now;
    if (state === State.PLAYING) {
      acc += dt;
      while (acc >= stepMs) {
        step();
        acc -= stepMs;
        if (state !== State.PLAYING) break;
      }
    }
    render(now);
    requestAnimationFrame(loop);
  }

  // expose a tiny test hook so the game can be driven headlessly in the preview
  window.SNAKE = {
    start,
    setDir: (x, y) => setDir(x, y),
    tick: () => { if (state === State.PLAYING) step(); },
    get state() { return state; },
    get score() { return score; },
    get length() { return snake ? snake.length : 0; },
    States: State,
  };

  reset();
  state = State.MENU;
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>

# harness/omp/acp_config.yml
#
# One-process config overlay for the `omp acp` server the desktop backend spawns
# (acp_backend.ts passes it via `--config`). Precedence: runtime flags > this
# overlay > project config > global ~/.omp/agent/config.yml.
#
# ADR-0032 (fix): task isolation is DISABLED (`mode: none`). It was enabled in
# ADR-0028 so subagents would run in an isolated copy and return a reviewable
# patch — but on this product that STRANDED built files: omp captured the
# subagent's edits as a patch (merge: patch) that LucidAgentIDE has no UI to
# apply, and the Windows merge-back (projfs/block-clone/rcopy + git apply) is
# fragile and can fail silently. Net effect: the agent "built" a file in an
# isolated workspace and it never appeared on disk — the bug this reverts.
#
# With isolation off, a `task` subagent runs in the REAL workspace, so its
# write/edit lands directly where the user sees it. The security gate still scans
# EVERY tool call in-process, fail-closed — that, not isolation, is the load-
# bearing protection. Re-enable isolation only once (a) a patch-review/apply UI
# exists and (b) the chosen backend's merge is verified reliable on Windows.
task:
  isolation:
    mode: none

# P-EDIT.1 (ADR-0105): use the `replace` (search/replace) edit tool instead of omp's default `hashline`.
# hashline anchors each hunk to line-hash markers the model must have "displayed", one hunk per range — a
# format Claude/GPT frequently violate, producing a stream of "this edit anchors to lines … that […#hash]
# never displayed" / "anchor line X already targeted by another hunk" failures on real edits. `replace` is
# the classic, model-friendly find-old→put-new format (what Claude Code / aider use), far more robust here.
# The security gate still scans every edit in-process, fail-closed — only the edit FORMAT changes. This also
# gives the inline edit preview (P-CHAT.1) a clean old→new diff instead of a hashline patch.
edit:
  mode: replace

# P-EGRESS.1 (ADR-0062): force the network-reaching tools to PROMPT, honored in EVERY approval mode
# (including omp's default `yolo`, which otherwise auto-runs them). Without this an agent silently browses
# arbitrary internet sites — a real risk in a security/provenance product. The desktop intercepts these
# permission requests (acp_backend onRequest) and shows the per-website approval dialog; a standing user
# decision (allow-this-site / danger mode) can still auto-allow without prompting.
tools:
  approval:
    browser: prompt
    web_search: prompt
    web: prompt
    fetch: prompt
    # P-EXEC.1 (ADR-0066): force the exec tools to PROMPT too. omp's default auto-runs bash/eval in Agent
    # mode; the desktop intercepts these (acp_backend onRequest → askExec) and classifies the command —
    # read-only commands auto-approve, risky ones gate, a catastrophic set (rm -rf, sudo, pipe-to-shell,
    # …) always prompts. Defense in depth ON TOP OF the scanner, which still scans every call fail-closed.
    bash: prompt
    eval: prompt

# Continuous integration: typecheck + the full test suite on every push and PR to master.
# Gives PRs (e.g. from collaborators) a green/red signal before merge, and keeps the
# README test badge honest.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: Harness tests + typecheck (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The load-bearing invariants live in BOTH CLAUDE.md (Claude Code) and AGENTS.md (the
      # cross-tool standard). They must stay byte-identical below the title line, or one tool's
      # agents follow stale rules. This fails the build the moment they diverge.
      - name: CLAUDE.md / AGENTS.md must stay in sync
        run: |
          if ! diff <(tail -n +2 CLAUDE.md) <(tail -n +2 AGENTS.md) >/dev/null; then
            echo "::error::AGENTS.md and CLAUDE.md have diverged below the title line. Keep the invariants identical (only line 1, the '# X — Invariants' title, may differ)."
            diff <(tail -n +2 CLAUDE.md) <(tail -n +2 AGENTS.md) || true
            exit 1
          fi
          echo "✓ CLAUDE.md and AGENTS.md are in sync."

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # NOT --frozen-lockfile: Dependabot's npm updater bumps package.json but can't update
      # bun.lock, so a frozen install would reject every Dependabot PR. Plain install resolves
      # the bump and still runs the full suite against it.
      - name: Install (root)
        run: bun install

      - name: Typecheck (root)
        run: bun x tsc --noEmit

      # Every first-party source file must carry the BUSL-1.1 SPDX header. The pre-commit hook
      # (make install-hooks) applies these automatically; this is the backstop for anything that
      # slipped through (e.g. a commit made without the hook installed).
      - name: License headers (BUSL-1.1)
        run: bun run tools/license_headers.ts --check

      - name: Harness test suite
        run: bun test harness

      - name: Install + typecheck (desktop)
        working-directory: desktop
        run: |
          bun install
          bun x tsc --noEmit

  scanner:
    name: Unicode scanner tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Pytest (scanner-sidecar)
        working-directory: scanner-sidecar
        run: |
          python -m pip install --upgrade pip pytest
          python -m pytest

# Claude Code remote sessions.
#
# Lets you drive a remote Claude agent on this repo by mentioning @claude in an
# issue or PR comment (or opening an issue containing @claude). The agent reads
# HANDOFF.md + CLAUDE.md for context (the session ritual + invariants).
#
# ONE-TIME SETUP (required before this runs):
#   1. Install the Claude GitHub App on mlcyclops/lucidagentide:
#        https://github.com/apps/claude
#   2. Add a repo secret ANTHROPIC_API_KEY (Settings -> Secrets and variables ->
#      Actions) — or wire OAuth per the action docs.
#   Docs: https://github.com/anthropics/claude-code-action
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only run when @claude is mentioned.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      # The harness runs on Bun; the scanner sidecar on uv. Provide both so the
      # remote agent can run `bun test harness` and the sidecar pytest.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # The agent is handed CLAUDE.md (invariants) + HANDOFF.md (current
          # state) as repo context. Keep the session ritual: one increment,
          # green baseline first, 3-line PROGRESS entry.
          claude_args: |
            --append-system-prompt "Read HANDOFF.md and CLAUDE.md before any change. Follow the session ritual: confirm a green baseline (bun test harness), build exactly one increment, keep every CLAUDE.md invariant, and append a 3-line PROGRESS.md entry. Do not edit frozen contracts as a side effect."

<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LucidAgentIDE — a fail-closed security, provenance and memory harness around oh-my-pi">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0b0f"/>
      <stop offset="0.55" stop-color="#0d0f17"/>
      <stop offset="1" stop-color="#120f1c"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c64bd6" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#c64bd6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="word" x1="360" y1="120" x2="900" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f3b8ff"/>
      <stop offset="0.45" stop-color="#e07bf0"/>
      <stop offset="0.75" stop-color="#6ad6e6"/>
      <stop offset="1" stop-color="#7ef0a8"/>
    </linearGradient>
    <linearGradient id="beamM" x1="300" y1="170" x2="1180" y2="78" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="0.18" stop-color="#e07bf0" stop-opacity="0.85"/><stop offset="1" stop-color="#e07bf0" stop-opacity="0"/></linearGradient>
    <linearGradient id="beamB" x1="300" y1="176" x2="1180" y2="134" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="0.18" stop-color="#5e8df2" stop-opacity="0.8"/><stop offset="1" stop-color="#5e8df2" stop-opacity="0"/></linearGradient>
    <linearGradient id="beamC" x1="300" y1="182" x2="1180" y2="186" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/><stop offset="0.18" stop-color="#46c8dc" stop-opacity="0.85"/><stop offset="1" stop-color="#46c8dc" stop-opacity="0"/></linearGradient>
    <linearGradient id="beamG" x1="300" y1="188" x2="1180" y2="238" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="0.18" stop-color="#46d27e" stop-opacity="0.82"/><stop offset="1" stop-color="#46d27e" stop-opacity="0"/></linearGradient>
    <linearGradient id="beamA" x1="300" y1="194" x2="1180" y2="288" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/><stop offset="0.18" stop-color="#e8b23c" stop-opacity="0.8"/><stop offset="1" stop-color="#e8b23c" stop-opacity="0"/></linearGradient>
    <linearGradient id="prismFace" x1="150" y1="120" x2="300" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b3450" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#161a28" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="rule" x1="360" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e07bf0" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#9bd2e0" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#7ef0a8" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="nodeGlow" x="-120%" y="-120%" width="340%" height="340%"><feGaussianBlur stdDeviation="3.5"/></filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" fill="none" stroke="#7c86ff" stroke-opacity="0.05" stroke-width="1"/></pattern>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="340" fill="url(#bg)"/>
  <rect width="1280" height="340" fill="url(#grid)"/>
  <ellipse cx="600" cy="170" rx="520" ry="220" fill="url(#halo)"/>

  <!-- incoming white beam -->
  <rect x="20" y="178" width="150" height="4" rx="2" fill="#ffffff" opacity="0.85" filter="url(#soft)"/>
  <rect x="20" y="179" width="150" height="2" rx="1" fill="#ffffff"/>

  <!-- prism -->
  <path d="M168 110 L300 180 L168 250 Z" fill="url(#prismFace)" stroke="#6b76a6" stroke-opacity="0.75" stroke-width="1.5" stroke-linejoin="round" filter="url(#soft)"/>
  <path d="M168 110 L300 180" stroke="#cfe0ff" stroke-opacity="0.45" stroke-width="1.2"/>

  <!-- refracted spectrum beams -->
  <g fill="none" stroke-linecap="round">
    <path d="M300 180 C 620 150, 900 100, 1180 78"  stroke="url(#beamM)" stroke-width="3"/>
    <path d="M300 180 C 620 168, 900 150, 1180 134" stroke="url(#beamB)" stroke-width="3"/>
    <path d="M300 180 C 620 182, 900 184, 1180 186" stroke="url(#beamC)" stroke-width="3.4"/>
    <path d="M300 180 C 620 196, 900 216, 1180 238" stroke="url(#beamG)" stroke-width="3"/>
    <path d="M300 180 C 620 210, 900 252, 1180 288" stroke="url(#beamA)" stroke-width="3"/>
  </g>

  <!-- knowledge-graph constellation (right) -->
  <g fill="none" stroke="#46c8dc" stroke-opacity="0.32" stroke-width="1.3">
    <path d="M1018 96 L1092 150"/><path d="M1092 150 L1170 120"/><path d="M1092 150 L1050 214"/>
    <path d="M1050 214 L1132 232"/><path d="M1050 214 L1004 168"/><path d="M1132 232 L1180 188"/>
    <path d="M1004 168 L1018 96"/>
  </g>
  <g filter="url(#nodeGlow)">
    <circle cx="1018" cy="96"  r="7" fill="#e07bf0"/>
    <circle cx="1092" cy="150" r="9" fill="#46c8dc"/>
    <circle cx="1170" cy="120" r="6" fill="#5e8df2"/>
    <circle cx="1050" cy="214" r="8" fill="#46d27e"/>
    <circle cx="1132" cy="232" r="6" fill="#e8b23c"/>
    <circle cx="1004" cy="168" r="5" fill="#9bd2e0"/>
    <circle cx="1180" cy="188" r="5" fill="#e07bf0"/>
  </g>
  <g>
    <circle cx="1018" cy="96"  r="4" fill="#fbe8ff"/>
    <circle cx="1092" cy="150" r="5" fill="#e6fbff"/>
    <circle cx="1170" cy="120" r="3.4" fill="#e9f0ff"/>
    <circle cx="1050" cy="214" r="4.4" fill="#e6fff0"/>
    <circle cx="1132" cy="232" r="3.4" fill="#fff4d9"/>
    <circle cx="1004" cy="168" r="3" fill="#eefcff"/>
    <circle cx="1180" cy="188" r="3" fill="#fbe8ff"/>
  </g>

  <!-- wordmark -->
  <g font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif">
    <text x="358" y="178" font-size="92" font-weight="800" letter-spacing="-2" fill="url(#word)" opacity="0.55" filter="url(#soft)">LUCID</text>
    <text x="358" y="178" font-size="92" font-weight="800" letter-spacing="-2" fill="url(#word)">LUCID</text>
    <text x="362" y="222" font-size="34" font-weight="600" letter-spacing="7" fill="#aeb4c6">AGENT&#160;&#160;IDE</text>
    <rect x="362" y="240" width="430" height="2" rx="1" fill="url(#rule)"/>
    <text x="362" y="276" font-size="20" font-weight="500" fill="#cdd3e4">A fail&#8209;closed <tspan fill="#e07bf0" font-weight="700">security</tspan> · <tspan fill="#46c8dc" font-weight="700">provenance</tspan> · <tspan fill="#7ef0a8" font-weight="700">memory</tspan> harness</text>
    <text x="362" y="302" font-size="16" font-weight="500" fill="#727a90">around <tspan fill="#aeb4c6" font-weight="600">oh&#8209;my&#8209;pi</tspan> — extend, never fork.</text>
  </g>

  <!-- shield mark above the wordmark -->
  <g transform="translate(286,104)" filter="url(#soft)">
    <path d="M28 4 L50 13 V31 C50 45 40 53 28 58 C16 53 6 45 6 31 V13 Z" fill="#12131c" stroke="#e07bf0" stroke-width="2.4" stroke-linejoin="round"/>
    <path d="M17 31 l8 8 l16 -18" fill="none" stroke="#7ef0a8" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <!-- font-src adds data: for Monaco's codicon font (inlined as a data:font/ttf URL in its min build);
       worker-src adds blob: for Monaco's language-service workers; media-src adds blob:/data: for the
       locally-synthesized TTS audio (read-aloud + podcast player, decoded to a Blob URL in-renderer).
       All are same-origin-derived and cannot exfiltrate - egress stays locked by connect-src
       'self'/localhost and script-src 'self'. -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; media-src 'self' blob: data:; connect-src 'self' http://localhost:* ws://localhost:*; script-src 'self'; worker-src 'self' blob:" />
  <title>LucidAgentIDE</title>
  <link rel="stylesheet" href="vendor/katex/katex.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app"></div>
  <div id="tip"></div>
  <div id="scrim"></div>
  <div id="toasts"></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
